<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katipunang Kabataan Profiling</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #eff2f8;
      --surface: #ffffff;
      --surface2: #f5f8fd;
      --text: #1f2a37;
      --muted: #5e6f89;
      --border: #dce3ef;
      --accent: #3f6dff;
      --accent-soft: #e7eeff;
      --danger: #dc3545;
      --success: #198754;
    }
    .dark {
      --bg: #0f172a;
      --surface: #111827;
      --surface2: #1f2937;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #3b82f6;
      --accent-soft: #1e3a8a;
      --danger: #f87171;
      --success: #34d399;
    }

    body { background: var(--bg); color: var(--text); }
    .card, .table-card { background: var(--surface); border-color: var(--border); }
    h1, h2, h3, label, th, td, .btn-plain { color: var(--text); }
    .muted { color: var(--muted); }
    .btn-primary { background: var(--accent); border-color: var(--accent); }
    .btn-primary:hover, .btn-primary:focus-visible { background: #2f61f0; }
    .btn-secondary { background: var(--surface2); border-color: var(--border); }
    .btn-danger { background: var(--danger); }
    .input-field input, .filter-row input, .filter-row select { background: var(--surface2); border-color: var(--border); color: var(--text); }
    .modal { background: var(--surface); border-color: var(--border); }
    .modal-content {
      max-height: min(80vh, 720px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-body {
      overflow-y: auto;
      padding-right: 0.5rem;
      margin-bottom: 0.75rem;
    }
    @media (min-width: 768px) {
      .modal-form-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
    @media (max-width: 767px) {
      .modal-form-grid {
        grid-template-columns: repeat(1, minmax(0,1fr));
      }
      .main-wrapper {
        padding: 0.75rem;
      }
      h1 { font-size: 1.1rem; line-height: 1.3; }
      .theme-toggler { font-size: 0.8rem; padding: 0.4rem 0.6rem; }
      .modal-content { width: 95vw; padding: 0.75rem; }
      .btn-animated, .btn-primary, .btn-secondary, .btn-danger { width: 100%; text-align: center; }
      table th, table td { padding: 0.4rem 0.5rem; font-size: 0.75rem; }
      #pagination { justify-content: center; font-size: 0.75rem; }

      #dataTable {
        display: none;
      }
      #cardView {
        display: block;
      }

      #searchInput {
        width: 100%;
        padding-left: 2.6rem;
      }
      #searchButton {
        display: block;
      }

      .pagination-wrapper {
        width: 100%;
        justify-content: center;
      }
    }

    #cardView {
      display: none;
    }

    .card-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 0.8rem;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card-row:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.14);
    }
    .card-row .card-row-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }
    .card-row .card-row-field {
      display: flex;
      justify-content: space-between;
      margin: 0.15rem 0;
      font-size: 0.85rem;
    }

    table thead { background: var(--surface2); }
    table td, table th { border-color: var(--border); }
    .navbar { background: var(--surface); border-color: var(--border); }
    .theme-toggler { color: var(--text); border-color: var(--border); }
    .toast { background: rgba(15, 23, 42, 0.88); }

    .fade-in-page {
      animation: fadeInPage 0.6s ease forwards;
      opacity: 0;
    }

    .fade-in-row {
      animation: fadeInRow 0.4s ease forwards;
      opacity: 0;
      transform: translateY(8px);
    }

    .btn-animated {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .btn-animated:hover {
      transform: translateY(-1px);
      box-shadow:0 8px 18px rgba(15,23,42,0.16);
    }

    @keyframes fadeInPage {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInRow {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-color-scheme: dark) {
      body:not(.light) { background: var(--bg); }
    }
  </style>
</head>

function getSvgIcon(name, classes = 'inline-block w-4 h-4') {
  const icons = {
    layout: `<svg xmlns="http://www.w3.org/2000/svg" class="${classes}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M14 14h7v7h-7z"/><path d="M3 14h7v7H3z"/></svg>`,
    moon: `<svg xmlns="http://www.w3.org/2000/svg" class="${classes}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 0111.21 3 7 7 0 0012 21a9 9 0 009-8.21z"/></svg>`,
    sun: `<svg xmlns="http://www.w3.org/2000/svg" class="${classes}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>`,
    search: `<svg xmlns="http://www.w3.org/2000/svg" class="${classes}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
    refresh: `<svg xmlns="http://www.w3.org/2000/svg" class="${classes}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.05 11a7 7 0 0113.9-2m0 0V4m0 5h-5"/><path d="M19.95 13a7 7 0 01-13.9 2m0 0v5m0-5h5"/></svg>`,
    plus: `<svg xmlns="http://www.w3.org/2000/svg" class="${classes}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`,
    edit: `<svg xmlns="http://www.w3.org/2000/svg" class="${classes}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>`,
    trash: `<svg xmlns="http://www.w3.org/2000/svg" class="${classes}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`
  };
  return icons[name] || '';
}

function applyTheme(theme){
  document.body.classList.remove('light','dark');
  document.body.classList.add(theme);
  localStorage.setItem('crudTheme', theme);
  const themeIcon = theme === 'dark' ? 'sun' : 'moon';
  document.getElementById('themeToggle').innerHTML = getSvgIcon(themeIcon, 'inline-block w-4 h-4') + ' ' + (theme === 'dark' ? 'Switch to Light' : 'Switch to Dark');
}

function requirePassword() {
  const validPasswords = ['SKcamagong2024', 'SKcamagong2025', 'SKcamagong2026'];
  const overlay = document.getElementById('authOverlay');
  const input = document.getElementById('authInput');
  const btn = document.getElementById('authBtn');
  const err = document.getElementById('authError');

  const authToken = localStorage.getItem('skAuthToken');
  const authExpire = localStorage.getItem('skAuthExpire');
  const now = Date.now();

  if (authToken && authExpire && Number(authExpire) > now) {
    overlay.style.display = 'none';
    loadData();
    return;
  }

  function check() {
    const value = input.value.trim().toLowerCase();
    const normalizedValid = validPasswords.map(v => v.toLowerCase());
    if (normalizedValid.includes(value)) {
      err.classList.add('hidden');
      overlay.style.display = 'none';
      localStorage.setItem('skAuthToken', value);
      localStorage.setItem('skAuthExpire', String(Date.now() + 24 * 60 * 60 * 1000));
      loadData();
      return;
    }

    err.innerText = 'Invalid password. Make sure caps lock is off and try again.';
    err.classList.remove('hidden');
  }

  btn.addEventListener('click', check);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') check();
  });
}

function toggleTheme(){
  const current = document.body.classList.contains('dark') ? 'dark' : 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

(function(){
  const saved = localStorage.getItem('crudTheme');
  const prefer = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(prefer);

function setFieldValue(fieldId, value) {

  if (el) el.value = value || '';
}

function normalizeKey(key) {
  return String(key || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

const canonicalHeaderSynonyms = {
  'first name': ['first name', 'firstname', 'given name', 'givenname'],
  'middle name': ['middle name', 'middlename'],
  'last name': ['last name', 'lastname', 'surname', 'family name'],
  'district': ['district', 'area', 'location'],
  'gender': ['gender', 'sex'],
  'age': ['age'],
  'birthdate': ['birthdate', 'birth date', 'date of birth', 'dob'],
  'e-mail address': ['e-mail address', 'email address', 'e-mail', 'email'],
  'contact no.': ['contact no.', 'contact no', 'phone', 'phone number', 'contact']
};

function findMatchingHeader(fieldKey, headerMap) {
  const normalized = normalizeKey(fieldKey);
  if (headerMap[normalized]) return headerMap[normalized];

  for (const canonical in canonicalHeaderSynonyms) {
    const aliases = canonicalHeaderSynonyms[canonical];
    if (aliases.includes(normalized)) {
      for (const alt of aliases) {
        if (headerMap[alt]) return headerMap[alt];
      }
    }
  }

  // fallback: try matching by any alias in map
  for (const canonical in canonicalHeaderSynonyms) {
    const aliases = canonicalHeaderSynonyms[canonical];
    for (const alt of aliases) {
      if (headerMap[alt]) {
        const altKey = normalizeKey(alt);
        if (altKey === normalized) return headerMap[alt];
      }
    }
  }

  return null;
}

function getDistrictColumnIndex() {
  return headers.findIndex(h => /district/i.test(h));
}

function populateDistrictFilter() {
  const select = document.getElementById('districtFilter');
  if (!select) return;
  const index = getDistrictColumnIndex();
  const districts = new Set();
  if (index >= 0 && fullDataCache.length > 1) {
    fullDataCache.slice(1).forEach(row => {
      const value = String(row[index] || '').trim();
      if (value) districts.add(value);
    });
  }

  const sorted = Array.from(districts).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));

  select.innerHTML = '<option value="">All Districts</option>';
  sorted.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d;
    select.appendChild(opt);
  });
}

function getValueFromObject(key, sourceObj) {
  if (!sourceObj) return '';
  const normalizedKey = normalizeKey(key);
  for (const k in sourceObj) {
    if (normalizeKey(k) === normalizedKey) {
      return String(sourceObj[k] || '').trim();
    }
  }
  return '';
}

function normalizeDateInputValue(value) {
  if (!value) return '';
  const raw = String(value).trim();

  // Accept YYYY-MM-DD directly
  const isoRe = /^\d{4}-\d{2}-\d{2}$/;
  if (isoRe.test(raw)) return raw;

  // Accept MM/DD/YYYY
  const mdyRe = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/;
  let match = mdyRe.exec(raw);
  if (match) {
    const [ , m, d, y ] = match;
    const mm = String(m).padStart(2, '0');
    const dd = String(d).padStart(2, '0');
    return `${y}-${mm}-${dd}`;
  }

  // Accept DD/MM/YYYY
  const dmyRe = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/;
  match = dmyRe.exec(raw);
  if (match) {
    const [ , d, m, y ] = match;
    if (Number(m) > 0 && Number(m) <= 12) {
      const mm = String(m).padStart(2, '0');
      const dd = String(d).padStart(2, '0');
      return `${y}-${mm}-${dd}`;
    }
  }

  // Try via Date parser
  const dt = new Date(raw);
  if (!isNaN(dt.valueOf())) {
    const mm = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    const yyyy = dt.getFullYear();
    return `${yyyy}-${mm}-${dd}`;
  }

  return '';
}

function getFieldValueById(fieldId) {
  // onboardingData > editingRowData > current DOM value > headers data
  let value = getValueFromObject(fieldId, onboardingData);
  if (value) return value;

  value = getValueFromObject(fieldId, editingRowData);
  if (value) return value;

  value = getFieldValue(fieldId);
  if (value) return value;

  const normalizedId = normalizeKey(fieldId);
  const headerMap = {};
  headers.forEach(h => {
    headerMap[normalizeKey(h)] = h;
  });

  const matchingHeader = findMatchingHeader(normalizedId, headerMap);
  if (matchingHeader) {
    const element = document.getElementById('field_' + matchingHeader);
    if (element && element.value) return element.value.trim();
    value = getValueFromObject(matchingHeader, editingRowData);
    if (value) return value;
  }

  // Fall back to editingRowData synonyms if headers don't match directly
  if (editingRowData) {
    const editingKeyMap = {};
    Object.keys(editingRowData).forEach(k => {
      editingKeyMap[normalizeKey(k)] = k;
    });
    const matchingEditKey = findMatchingHeader(normalizedId, editingKeyMap);
    if (matchingEditKey) {
      return String(editingRowData[matchingEditKey] || '').trim();
    }

    // Extra fallback: partial substring match for things like 'birthdate (mm/dd/yyyy)'
    for (const k in editingKeyMap) {
      if (k.includes(normalizedId) || normalizedId.includes(k)) {
        return String(editingRowData[editingKeyMap[k]] || '').trim();
      }
    }
  }

  return '';
}

function validateCurrentStep() {
  const step = onboardingSteps[onboardingStep];
  for (const field of step.fields) {
    if (field.required) {
      const value = getFieldValue(field.id);
      if (!value) {
        showToast(`${field.label} is required.`, 'danger');
        return false;
      }
    }
  }
  return true;
}

function renderOnboardingForm() {
  const container = document.getElementById('formFieldsContainer');
  container.innerHTML = '';

  const step = onboardingSteps[onboardingStep];
  document.getElementById('modalTitle').innerText = `${editingIndex !== null ? 'Update' : 'Add'} Record - ${step.title}`;

  const headerWrap = document.createElement('div');
  headerWrap.className = 'mb-4 text-gray-700 flex flex-col gap-2';

  const heading = document.createElement('h3');
  heading.className = 'text-2xl text-gray-700 font-bold';
  heading.textContent = step.title;
  headerWrap.appendChild(heading);

  const subtitle = document.createElement('div');
  subtitle.className = 'text-sm text-slate-500';
  subtitle.textContent = `Step ${onboardingStep + 1} of ${onboardingSteps.length}`;
  headerWrap.appendChild(subtitle);

  const hr = document.createElement('hr');
  hr.className = 'border-gray-300';
  headerWrap.appendChild(hr);

  container.appendChild(headerWrap);

  const fieldsWrapper = document.createElement('div');
  fieldsWrapper.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4';

  const assemblyValue = getFieldValueById('Have You Already Attended A KK Assembly') || getFieldValueById('Have You Already Attended A KK Assembly?');

  function shouldShowField(field) {
    const idNorm = normalizeKey(field.id);
    if (['if no, why?', 'kkk concern:', 'suggestion:'].includes(idNorm)) {
      return assemblyValue.toLowerCase() === 'no';
    }
    if (['if yes, how many times?', 'concern:', 'suggestion'].includes(idNorm)) {
      return assemblyValue.toLowerCase() === 'yes';
    }
    return true;
  }

  step.fields.forEach(field => {
    if (!shouldShowField(field)) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'flex flex-col mb-2';

    const label = document.createElement('label');
    label.className = 'text-gray-700 font-semibold mb-1';
    label.innerText = field.label + (field.required ? ' *' : '');

    let input;
    if (field.type === 'select') {
      input = document.createElement('select');
      (field.options || []).forEach(option => {
        const o = document.createElement('option');
        o.value = option;
        o.textContent = option;
        input.appendChild(o);
      });
    } else if (field.type === 'textarea') {
      input = document.createElement('textarea');
      input.rows = 3;
    } else {
      input = document.createElement('input');
      input.type = field.type || 'text';
      if (field.min) input.min = field.min;
      if (field.max) input.max = field.max;
      if (field.placeholder) input.placeholder = field.placeholder;
    }

    input.id = 'field_' + field.id;
    input.className = 'w-full p-3 border text-gray-700 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50';

    let value = getFieldValueById(field.id);
    if (field.type === 'date' && value) {
      const normalizedDate = normalizeDateInputValue(value);
      if (normalizedDate) {
        value = normalizedDate;
      }
    }
    if (value) input.value = value;

    if (field.id === 'Birthdate' || /birthdate/i.test(field.id)) {
      input.addEventListener('change', () => {
        const dateValue = normalizeDateInputValue(input.value);
        if (!dateValue) return;
        const ageInput = document.getElementById('field_Age');
        if (!ageInput) return;

        const dob = new Date(dateValue);
        if (isNaN(dob.valueOf())) {
          ageInput.value = '';
          return;
        }

        const today = new Date();
        let age = today.getFullYear() - dob.getFullYear();
        const m = today.getMonth() - dob.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
          age -= 1;
        }
        ageInput.value = age >= 0 ? age : '';
      });
    }

    wrapper.appendChild(label);
    wrapper.appendChild(input);

    const assemblyKeys = ['have you already attended a kk assembly', 'have you already attended a kk assembly?'];
    if (assemblyKeys.includes(normalizeKey(field.id))) {
      input.addEventListener('change', () => {
        saveCurrentStepData();
        renderOnboardingForm();
      });
    }

    fieldsWrapper.appendChild(wrapper);
  });

  container.appendChild(fieldsWrapper);

  const prevBtn = document.getElementById('modalPrevBtn');
  prevBtn.disabled = onboardingStep === 0;
  prevBtn.style.display = onboardingStep === 0 ? 'none' : 'inline-flex';
  const nextBtn = document.getElementById('modalNextBtn');
  nextBtn.innerText = onboardingStep === onboardingSteps.length - 1 ? 'Submit' : 'Next';

  const inputElements = document.querySelectorAll('#formFieldsContainer input, #formFieldsContainer select, #formFieldsContainer textarea');
  inputElements.forEach(i => {
    i.style.minWidth = '240px';
    i.style.maxWidth = '100%';
  });
}

function saveCurrentStepData() {
  const step = onboardingSteps[onboardingStep];
  step.fields.forEach(field => {
    const el = document.getElementById('field_' + field.id);
    if (el) onboardingData[field.id] = el.value;
  });
}

function buildRowObjFromOnboarding() {
  const rowObj = {};
  const headerMap = {};
  headers.forEach(h => {
    headerMap[normalizeKey(h)] = h;
  });

  // write page fields into row object by header match, else keep field id
  onboardingSteps.forEach(step => {
    step.fields.forEach(field => {
      const fieldKey = normalizeKey(field.id);
      let value = getFieldValueById(field.id);
      if (value === '' && editingRowData) {
        value = getValueFromObject(field.id, editingRowData);
      }

      const matchingHeader = findMatchingHeader(fieldKey, headerMap);
      if (matchingHeader) {
        rowObj[matchingHeader] = value;
      } else {
        rowObj[field.id] = value;
      }
    });
  });

  // ensure all existing headers are present
  headers.forEach(h => {
    if (!Object.prototype.hasOwnProperty.call(rowObj, h) || rowObj[h] === '') {
      const value = getValueFromObject(h, onboardingData) || getValueFromObject(h, editingRowData) || getFieldValue(h);
      if (value !== '') rowObj[h] = value;
    }
  });

  return rowObj;
}

function nextOnboardingStep() {
  if (!validateCurrentStep()) return;
  saveCurrentStepData();
  if (onboardingStep < onboardingSteps.length - 1) {
    onboardingStep += 1;
    renderOnboardingForm();
    return;
  }
  submitForm();
}

function prevOnboardingStep() {
  saveCurrentStepData();
  if (onboardingStep <= 0) return;
  onboardingStep -= 1;
  renderOnboardingForm();
}

function resetOnboardingForm() {
  onboardingData = {};
  onboardingSteps.forEach(step => {
    step.fields.forEach(field => {
      setFieldValue(field.id, '');
    });
  });
}

// --- LOAD ALL ---
function loadData() {
  showLoading();
  const script = document.createElement("script");
  script.src = `${API_URL}?action=list&callback=handleData`;
  document.body.appendChild(script);
}

function searchData() {
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
  const district = document.getElementById("districtFilter") ? document.getElementById("districtFilter").value.trim().toLowerCase() : '';

  if (!fullDataCache.length) {
    // if no data loaded yet, fetch at least once
    loadData();
    return;
  }

  if (!keyword && !district) {
    dataCache = fullDataCache.slice();
    currentPage = 0;
    renderPaginatedTable();
    return;
  }

  const districtIdx = getDistrictColumnIndex();
  const firstNameIdx = headers.findIndex(h => /first\s*name/i.test(h));
  const middleNameIdx = headers.findIndex(h => /middle\s*name/i.test(h));
  const lastNameIdx = headers.findIndex(h => /last\s*name/i.test(h));
  const emailIdx = headers.findIndex(h => /e-?mail/i.test(h));

  const filteredRows = fullDataCache.slice(1).filter(row => {
    let matchesKeyword = true;
    if (keyword) {
      let searchText = '';
      if (firstNameIdx >= 0 || middleNameIdx >= 0 || lastNameIdx >= 0 || emailIdx >= 0) {
        const candidates = [];
        if (firstNameIdx >= 0) candidates.push(String(row[firstNameIdx] || ''));
        if (middleNameIdx >= 0) candidates.push(String(row[middleNameIdx] || ''));
        if (lastNameIdx >= 0) candidates.push(String(row[lastNameIdx] || ''));
        if (emailIdx >= 0) candidates.push(String(row[emailIdx] || ''));
        searchText = candidates.join(' ').toLowerCase();
      } else {
        searchText = row.map(cell => String(cell || '').toLowerCase()).join(' ');
      }

      matchesKeyword = searchText.includes(keyword);
    }

    const matchesDistrict = !district || (districtIdx >= 0 && String(row[districtIdx] || '').trim().toLowerCase() === district);
    return matchesKeyword && matchesDistrict;
  });

  dataCache = [fullDataCache[0], ...filteredRows];
  currentPage = 0;
  renderPaginatedTable();
}

// --- HANDLE DATA ---
function handleData(data) {
  hideLoading();
  if (!data || data.error) {
    document.getElementById("dataTable").innerHTML = "<tr><td class='p-4'>No data or error</td></tr>";
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  fullDataCache = data;
  dataCache = data.slice();
  headers = dataCache[0] || [];
  currentPage = 0;
  populateDistrictFilter();
  renderPaginatedTable();
}

function renderPaginatedTable() {
  const table = document.getElementById("dataTable");
  table.innerHTML = "";

  if (!dataCache.length || dataCache.length < 2) {
    table.innerHTML = "<tr><td class='p-4 text-center text-gray-700'>No records found.</td></tr>";
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  const totalRows = dataCache.length - 1;
  const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
  currentPage = Math.min(currentPage, totalPages - 1);

  // Column filtering by request
  const hiddenFields = new Set([
    'date', 'gender', 'age', 'contact no', 'civil status',
    'youth classification', 'youth age group', 'work status', 'educational background',
    'e-mail address', 'registered sk voter', 'registered sk voter?',
    'registered national voter', 'registered national voter?',
    'did you vote last sk election', 'did you vote last sk election?',
    'have you already attended a kk assembly', 'have you already attended a kk assembly?',
    'if yes, how many times', 'if yes, how many times?',
    'concern:', 'if no, why', 'if no, why?', 'KKK Concern:', 'suggestion:', 'suggestion'
  ].map(s => s.toLowerCase()));

  const firstNameIdx = headers.findIndex(h => /first\s*name/i.test(h));
  const middleNameIdx = headers.findIndex(h => /middle\s*name/i.test(h));
  const lastNameIdx = headers.findIndex(h => /last\s*name/i.test(h));

  const displayColumns = [];
  if (firstNameIdx >= 0 || middleNameIdx >= 0 || lastNameIdx >= 0) {
    displayColumns.push({ type: 'fullname', label: 'Full Name', indexes: [firstNameIdx, middleNameIdx, lastNameIdx] });
  }

  headers.forEach((h, idx) => {
    const lower = h.trim().toLowerCase();
    if (idx === firstNameIdx || idx === middleNameIdx || idx === lastNameIdx) return;
    if (hiddenFields.has(lower)) return;
    displayColumns.push({ type: 'field', label: h, index: idx });
  });

  const rowsData = dataCache.slice(1).map((row, idx) => ({ row, originalIndex: idx }));

  const cardView = document.getElementById('cardView');
  const tableContainer = document.getElementById('dataTable');

  if (window.innerWidth <= 767) {
    tableContainer.style.display = 'none';
    cardView.style.display = 'block';

    const start = currentPage * pageSize;
    const end = Math.min(rowsData.length, start + pageSize);
    let cardHtml = '';
    const visibleRows = rowsData.slice(start, end);

    visibleRows.forEach(entry => {
      const row = entry.row;
      cardHtml += '<div class="card-row">';

      const fullName = [];
      if (firstNameIdx >= 0 && row[firstNameIdx]) fullName.push(row[firstNameIdx]);
      if (middleNameIdx >= 0 && row[middleNameIdx]) fullName.push(row[middleNameIdx]);
      if (lastNameIdx >= 0 && row[lastNameIdx]) fullName.push(row[lastNameIdx]);

      cardHtml += `<div class="card-row-header"><div><strong>${fullName.join(' ') || 'No Name'}</strong></div><div class="flex flex-col gap-1"><button class="bg-yellow-400 text-white px-2 py-1 text-xs rounded" onclick="editRow(${entry.originalIndex})">Edit</button><button class="bg-red-500 text-white px-2 py-1 text-xs rounded" onclick="deleteRow(${entry.originalIndex})">Delete</button></div></div>`;

      displayColumns.forEach(col => {
        if (col.type === 'fullname') return;
        let value = row[col.index] || '';
        let label = col.label;
        if (/birth\s*date/i.test(label)) {
          value = formatBirthDate(value);
          label = label.replace(/\s*\(mm\/?dd\/?yyyy\)\)?/i, '').trim();
        }
        cardHtml += `<div class="card-row-field"><span class="font-semibold">${label}</span><span>${value}</span></div>`;
      });

      cardHtml += '</div>';
    });

    cardView.innerHTML = cardHtml;
    renderPagination(totalPages, 1 + currentPage * pageSize, Math.min(rowsData.length, currentPage * pageSize + pageSize), totalRows);
    return;
  } else {
    tableContainer.style.display = 'table';
    cardView.style.display = 'none';
  }

  if (sortColumn !== null) {
    rowsData.sort((a,b) => {
      let aComp, bComp;

      if (sortColumn === 'fullname') {
        const mkName = rowEntry => {
          const names = [];
          if (firstNameIdx >= 0 && rowEntry.row[firstNameIdx]) names.push(String(rowEntry.row[firstNameIdx]).trim());
          if (middleNameIdx >= 0 && rowEntry.row[middleNameIdx]) names.push(String(rowEntry.row[middleNameIdx]).trim());
          if (lastNameIdx >= 0 && rowEntry.row[lastNameIdx]) names.push(String(rowEntry.row[lastNameIdx]).trim());
          return names.join(' ').toLowerCase();
        };
        aComp = mkName(a);
        bComp = mkName(b);
      } else {
        const aVal = a.row[sortColumn] || '';
        const bVal = b.row[sortColumn] || '';
        const isDate = /birth\s*date|date/i.test(headers[sortColumn] || '');
        if (isDate) {
          aComp = new Date(aVal);
          bComp = new Date(bVal);
        } else if (!isNaN(parseFloat(aVal)) && !isNaN(parseFloat(bVal))) {
          aComp = parseFloat(aVal);
          bComp = parseFloat(bVal);
        } else {
          aComp = String(aVal).toLowerCase();
          bComp = String(bVal).toLowerCase();
        }
      }

      if (aComp < bComp) return sortAsc ? -1 : 1;
      if (aComp > bComp) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  let html = "<thead class='bg-gray-50'><tr>";
  displayColumns.forEach(col => {
    let label = col.label;
    if (/birth\s*date/i.test(label)) {
      label = label.replace(/\s*\(mm\/dd\/yyyy\)\)?/i, '').trim();
    }

    if (col.type === 'field' || col.type === 'fullname') {
      const isSorted = col.type === 'fullname' ? sortColumn === 'fullname' : sortColumn === col.index;
      const sorted = isSorted ? (sortAsc ? ' ▲' : ' ▼') : '';
      const sortValue = col.type === 'fullname' ? "'fullname'" : col.index;
      html += `<th class="px-4 py-2 text-left text-sm font-medium text-gray-700 cursor-pointer" onclick="setSortBy(${sortValue})">${label}${sorted}</th>`;
    } else {
      html += `<th class="px-4 py-2 text-left text-sm font-medium text-gray-700">${label}</th>`;
    }
  });
  html += "<th class='px-4 py-2 text-left text-sm font-medium text-gray-700'>Actions</th></tr></thead><tbody class='divide-y divide-gray-200'>";

  const start = 0 + currentPage * pageSize;
  const end = Math.min(rowsData.length, start + pageSize);

  function formatBirthDate(value) {
    if (!value) return '';
    const raw = String(value).trim();
    const d = new Date(raw);
    if (isNaN(d.valueOf())) {
      const parts = raw.split(/[\/-]/).map(s => s.trim());
      if (parts.length === 3) {
        let [y, m, day] = parts;
        if (/^\d{4}$/.test(y)) {
          return `${String(m).padStart(2, '0')}/${String(day).padStart(2, '0')}/${y}`;
        }
        if (/^\d{4}$/.test(day)) {
          return `${String(m).padStart(2, '0')}/${String(y).padStart(2, '0')}/${day}`;
        }
      }
      return raw;
    }
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const yy = d.getFullYear();
    return `${mm}/${dd}/${yy}`;
  }

  for (let i = start; i < end; i++) {
    const entry = rowsData[i];
    const row = entry.row;
    const globalIndex = entry.originalIndex;
    html += "<tr class=\"fade-in-row\">";
    displayColumns.forEach(col => {
      if (col.type === 'fullname') {
        const nameParts = [];
        col.indexes.forEach(idx => {
          if (idx >= 0 && row[idx] != null && String(row[idx]).trim() !== '') {
            nameParts.push(String(row[idx]).trim());
          }
        });
        html += `<td data-label="${col.label}" class="px-4 py-2 text-sm text-gray-600">${nameParts.join(' ')}</td>`;
      } else {
        let cell = row[col.index];
        const lowerLabel = col.label.toLowerCase();
        if (lowerLabel.includes('birth')) {
          cell = formatBirthDate(cell);
        }
        html += `<td data-label="${col.label}" class="px-4 py-2 text-sm text-gray-600">${cell || ''}</td>`;
      }
    });
    html += `<td class="px-4 py-2 text-sm space-x-1">`;
    html += `<button onclick="editRow(${globalIndex})" class="bg-yellow-400 text-white px-2 py-1 rounded hover:bg-yellow-500" title="Edit"><svg xmlns="http://www.w3.org/2000/svg" class="inline-block w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></button>`;
    html += `<button onclick="deleteRow(${globalIndex})" class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600" title="Delete"><svg xmlns="http://www.w3.org/2000/svg" class="inline-block w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>`;
    html += `</td></tr>`;
  }

  html += "</tbody>";
  table.innerHTML = html;

  const startItem = 1 + currentPage * pageSize;
  const endItem = Math.min(rowsData.length, currentPage * pageSize + pageSize);
  renderPagination(totalPages, startItem, endItem, totalRows);
}

function renderPagination(totalPages, rangeStart, rangeEnd, totalRows) {
  const container = document.getElementById("pagination");
  if (totalPages <= 1) {
    container.innerHTML = "";
    return;
  }

  let html = `
    <div class="w-full flex flex-wrap items-center justify-between gap-2 py-2 px-1 text-sm text-gray-600">
      <span>Showing <strong class="text-gray-700">${rangeStart}</strong>–<strong class="text-gray-700">${rangeEnd}</strong> of <strong class="text-gray-700">${totalRows}</strong></span>
      <div class="flex items-center gap-1">`;

  html += `<button ${currentPage === 0 ? 'disabled' : ''} onclick="gotoPage(${currentPage - 1})" class="px-3 py-1.5 rounded-md border border-gray-300 bg-white text-gray-700 hover:bg-indigo-50 disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed">Prev</button>`;

  function addPageButton(page, label, active = false, disabled = false) {
    const style = active ? 'bg-indigo-600 text-white border border-indigo-600' : 'border border-gray-300 bg-white text-gray-700 hover:bg-gray-100';
    return `<button ${disabled ? 'disabled' : ''} onclick="gotoPage(${page})" class="px-3 py-1.5 rounded-md text-sm font-medium ${style} ${disabled ? 'opacity-50 cursor-not-allowed' : ''}">${label}</button>`;
  }

  html += addPageButton(0, '1', currentPage === 0, currentPage === 0);

  if (currentPage > 2) {
    html += `<span class="px-2 text-gray-400">…</span>`;
  }

  const startZone = Math.max(1, currentPage - 1);
  const endZone = Math.min(totalPages - 2, currentPage + 1);

  for (let i = startZone; i <= endZone; i++) {
    html += addPageButton(i, i + 1, i === currentPage);
  }

  if (currentPage < totalPages - 3) {
    html += `<span class="px-2 text-gray-400">…</span>`;
  }

  if (totalPages > 1) {
    html += addPageButton(totalPages - 1, totalPages, currentPage === totalPages - 1, currentPage === totalPages - 1);
  }

  html += addPageButton(currentPage + 1, 'Next', false, currentPage === totalPages - 1);

  html += `</div></div>`;
  container.innerHTML = html;
}

function gotoPage(page) {
  const totalRows = dataCache.length - 1;
  const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
  currentPage = Math.max(0, Math.min(totalPages - 1, page));
  renderPaginatedTable();
}


// --- RENDER FORM FIELDS ---
function renderFormFields() {
  const container = document.getElementById("formFields");
  container.innerHTML = "";

  const civStatusOptions = ["Single", "Married", "Widowed", "Separated", "Divorced"];
  const genderOptions = ["Male", "Female", "Other"];

  headers.forEach(h => {
    const lower = h.trim().toLowerCase();

    // Hide Email Address from the visible layout; keep internal value mapping
    if (lower === 'email address') {
      // ensure field exists as hidden to pass through submit
      const hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.id = "field_" + h;
      hidden.value = '';
      container.appendChild(hidden);
      return;
    }

    const wrapper = document.createElement("div");
    wrapper.className = "flex flex-col";
    const label = document.createElement("label");

    // Convert displayed label to E-mail Address for email field and keep mapping.
    if (lower === 'e-mail address') {
      label.innerText = 'E-mail Address';
      label.className = "text-gray-700 font-semibold mb-1";
      wrapper.appendChild(label);
      const field = document.createElement('input');
      field.type = 'email';
      field.id = "field_E-mail Address";
      field.className = "w-full p-3 text-gray-700 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50";
      wrapper.appendChild(field);
      container.appendChild(wrapper);
      return;
    }

    label.innerText = h;
    label.className = "text-gray-700 font-semibold mb-1";

    let field;
    if (lower.includes('gender')) {
      field = document.createElement('select');
      genderOptions.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        field.appendChild(o);
      });
    } else if (lower.includes('civil status')) {
      field = document.createElement('select');
      civStatusOptions.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        field.appendChild(o);
      });
    } else if (lower.includes('birth') || lower.includes('date')) {
      field = document.createElement('input');
      field.type = 'date';
    } else {
      field = document.createElement('input');
      field.type = 'text';
      field.placeholder = "Enter " + h;
    }

    field.id = "field_" + h;
    field.className = "w-full p-3 border text-gray-700 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50";

    wrapper.appendChild(label);
    wrapper.appendChild(field);
    container.appendChild(wrapper);
  });

  document.querySelectorAll('#formFields input, #formFields select').forEach(i => i.style.minWidth = '240px');
}

// --- SUBMIT FORM ---
function submitForm() {
  saveCurrentStepData();
  const rowObj = buildRowObjFromOnboarding();

  // set date field to today (mm/dd/yyyy)
  const now = new Date();
  const yy = now.getFullYear();
  const mm = String(now.getMonth()+1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const dateValue = `${mm}/${dd}/${yy}`;

  const dateHeader = headers.find(h => normalizeKey(h) === 'date' || normalizeKey(h) === 'date of entry' || normalizeKey(h) === 'date created');
  if (dateHeader) {
    rowObj[dateHeader] = dateValue;
  }
  rowObj['DATE'] = dateValue;

  if (editingIndex === null) {
    const dateIndex = headers.findIndex(h => normalizeKey(h) === 'date');
    if (dateIndex >= 0) {
      sortColumn = dateIndex;
      sortAsc = false;
    }
    currentPage = 0;

    postAction('add', rowObj, () => {
      resetForm();
      resetOnboardingForm();
      closeModal();
      showToast('Record added successfully');

      // Instant local refresh while we await backend fetch.
      if (fullDataCache && headers && headers.length) {
        const newRow = headers.map(h => rowObj[h] ?? '');
        fullDataCache.push(newRow);
        dataCache = fullDataCache.slice();
        renderPaginatedTable();
      }
      loadData();
    });
  } else {
    rowObj.rowIndex = editingIndex;
    postAction('update', rowObj, () => { resetForm(); resetOnboardingForm(); closeModal(); loadData(); showToast('Record updated successfully'); });
  }
}

// --- RESET FORM ---
function resetForm() {
  editingIndex = null;
  editingRowData = null;
  headers.forEach(h => {
    const field = document.getElementById('field_' + h);
    if (field) field.value = '';
  });
  onboardingSteps.forEach(step => {
    step.fields.forEach(field => {
      setFieldValue(field.id, '');
    });
  });
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toast = document.createElement('div');
  toast.textContent = message;
  toast.className = `toast rounded-lg px-4 py-2 text-sm font-medium ${type === 'success' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.transition = 'opacity 0.3s ease';
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 2200);
}

// --- EDIT ROW ---
function editRow(index) {
  editingIndex = index;
  const row = dataCache[index + 1];
  if (!row) return;

  const rowData = {};
  headers.forEach((h, i) => {
    rowData[h] = row[i] || '';
  });

  editingRowData = rowData;
  openModal('update', rowData);
}

function populateForm(row) {
  // kept for compatibility but not used now
  if (!row) return;
  headers.forEach((h, i) => {
    const field = document.getElementById("field_" + h);
    if (field) field.value = row[i] || "";
  });
  openModal('update');
}

// --- DELETE ROW ---
function deleteRow(index) {
  if (!confirm("Are you sure to delete this row?")) return;
  postAction("delete", {rowIndex: index}, loadData);
}

function setSortBy(columnIndex) {
  if (sortColumn === columnIndex) {
    sortAsc = !sortAsc;
  } else {
    sortColumn = columnIndex;
    sortAsc = true;
  }
  renderPaginatedTable();
}

// --- POST ACTION ---
function showLoading() {
  document.getElementById('loadingOverlay').classList.remove('hidden');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}

function postAction(action, body, callback) {
  showLoading();
  fetch(`${API_URL}?action=${action}`, {
    method: "POST",
    mode: "no-cors",  // We can’t read response, but Google Sheets will still update
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  })
  .then(() => {
    // We can’t read the JSON response due to CORS, so just reload table
    callback();
  })
  .catch(err => {
    console.error(err);
    showToast('An error occurred during action', 'danger');
  })
  .finally(() => {
    hideLoading();
  });
}

function scheduleSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchData();
  }, SEARCH_DEBOUNCE);
}

function onSearchKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    clearTimeout(searchTimeout);
    searchData();
  }
}

// --- SEARCH CONTROL ---
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("input", scheduleSearch);
searchInput.addEventListener("keydown", onSearchKey);
searchInput.addEventListener("click", (e) => {
  e.stopPropagation();
});

const searchButton = document.getElementById("searchButton");
function updateSearchButtonVisibility() {
  if (!searchButton) return;
  searchButton.style.display = window.innerWidth <= 767 ? 'block' : 'none';
}

if (searchButton) {
  searchButton.addEventListener('click', (e) => {
    e.preventDefault();
    clearTimeout(searchTimeout);
    searchData();
  });
}

window.addEventListener('resize', updateSearchButtonVisibility);
updateSearchButtonVisibility();

const districtFilter = document.getElementById('districtFilter');
if (districtFilter) {
  districtFilter.addEventListener('change', () => {
    clearTimeout(searchTimeout);
    searchData();
  });
}

// --- INITIAL LOAD ---
loadData();
</script>
